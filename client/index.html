<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5" />
    <meta name="description" content="LingoQuest is a gamified language learning platform with vocabulary practice, reading exercises, and interactive text adventures." />
    <title>LingoQuest - Language Learning Adventure</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="image" href="/adventure-hero.webp" fetchpriority="high" />
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Space+Grotesk:wght@400;600;700&display=swap" as="style" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet"></noscript>
    <style>
      /* Critical inline CSS for instant FCP */
      :root {
        --background: 210 20% 98%;
        --foreground: 222 47% 11%;
        --primary: 243 75% 59%;
        --accent: 262 83% 58%;
        --border: 214.3 31.8% 91.4%;
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: hsl(210 20% 98%);
        color: hsl(222 47% 11%);
        font-family: 'Outfit', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .shell {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        max-width: 28rem;
        margin: 0 auto;
        border-left: 1px solid hsl(214.3 31.8% 91.4% / 0.4);
        border-right: 1px solid hsl(214.3 31.8% 91.4% / 0.4);
      }
      .shell-header {
        padding: 1rem 1.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid hsl(214.3 31.8% 91.4% / 0.5);
      }
      .shell-logo {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .shell-logo-icon {
        width: 2rem;
        height: 2rem;
        border-radius: 0.5rem;
        background: linear-gradient(135deg, hsl(243 75% 59%), hsl(262 83% 58%));
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 700;
        font-size: 1.125rem;
      }
      .shell-logo-text {
        font-family: 'Space Grotesk', system-ui, sans-serif;
        font-weight: 700;
        font-size: 1.25rem;
      }
      .shell-hero {
        margin: 1.5rem 1rem 0;
        background: linear-gradient(135deg, hsl(243 75% 59%), hsl(262 83% 58%));
        border-radius: 1.5rem;
        padding: 1.5rem;
        color: white;
      }
      .shell-hero-label { opacity: 0.8; font-size: 0.875rem; margin-bottom: 0.25rem; }
      .shell-hero-title {
        font-family: 'Space Grotesk', system-ui, sans-serif;
        font-size: 1.875rem;
        font-weight: 700;
      }
      #root:not(:empty) + .shell-skeleton { display: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Skeleton for instant FCP - hidden once React renders -->
    <div class="shell-skeleton">
      <div class="shell">
        <div class="shell-header">
          <div class="shell-logo">
            <div class="shell-logo-icon">L</div>
            <span class="shell-logo-text">LingoQuest</span>
          </div>
        </div>
        <div class="shell-hero">
          <div class="shell-hero-label">Weekly Streak</div>
          <div class="shell-hero-title">4/7 Days</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
